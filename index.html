<!DOCTYPE html> 
<html lang="pt-br">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Agendamento | Lab Misturas Asfálticas</title>  
    <link rel="stylesheet" href="style.css">  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">  
    <style>  
        #selecao-inicial {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 50px 20px;
            flex-wrap: wrap;
            max-width: 1100px;
            margin: 0 auto;
        }
        .categoria-card {
            background: #fff;
            border: 3px solid #eee;
            border-radius: 20px;
            width: 300px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-decoration: none;
            display: block;
        }
        .categoria-card:hover {
            transform: translateY(-10px);
            border-color: #D35400;
            box-shadow: 0 15px 30px rgba(211, 84, 0, 0.2);
        }
        .categoria-card .icon-grande { font-size: 50px; margin-bottom: 20px; display: block; }
        .categoria-card h3 { color: #1A4A5A; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; margin: 0; }
    </style>
</head>
<body>
    <header class="main-header" style="background: linear-gradient(135deg, #1A4A5A 0%, #2a6f84 100%); padding: 16px 0; color: white; border-bottom: 4px solid #143a46; position: relative; overflow: hidden;"> 
        <div style="position: absolute; top: 0; right: 0; width: 45%; height: 100%; background: url('img/pavimento.jpg') no-repeat center right; background-size: cover; opacity: 0.15; pointer-events: none; z-index: 0;"></div> 
        <div class="container" style="display: flex; align-items: center; justify-content: center; gap: 50px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1;"> 
            <img src="img/foto.png" alt="Logotipo" style="width: 221px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.25);"> 
            <div style="text-align: left;"> 
                <h1 style="margin: 0; font-size: 2.7rem; font-weight: 900; line-height: 1.2; text-shadow: 0 4px 12px rgba(0,0,0,0.3); letter-spacing: -1px;">Sistema de Agendamento</h1> 
                <p style="margin: 5px 0 10px 0; font-size: 1.5rem; font-weight: 600; color: #FFD27D;">Laboratório de Misturas Asfálticas - LMP | INCT-Infra | UFC</p> 
            </div> 
        </div> 
    </header> 

    <section id="selecao-inicial">
        <a href="caracterizacao.html" class="categoria-card">
            <span class="icon-grande">🔬</span>
            <h3>Caracterização de Materiais</h3>
        </a>
        <a href="ensaios.html" class="categoria-card">
            <span class="icon-grande">🏗️</span>
            <h3>Ensaios Mecânicos</h3>
        </a>
        <a href="aulas.html" class="categoria-card">
            <span class="icon-grande">🎓</span>
            <h3>Uso para Aulas</h3>
        </a>
    </section>
</body>
</html>
